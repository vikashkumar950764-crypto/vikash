<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: black; /* Stylish black background */
            color: white; /* White text for contrast */
            padding: 20px;
        }

        #numbers-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap; 
            gap: 10px; 
        }

        .number-btn {
            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
            background-color: grey; /* Grey buttons */
            color: black;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .number-btn:hover {
            background-color: rgb(84, 82, 82); /* Darker grey on hover */
        }

        #result-display {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Guess the Number Game</h1>
    <p>I am thinking of a number between 1 and 10. Can you guess it?</p>
    <p>Chances are 3</p>

    <div id="numbers-container"></div>
    <div id="result-display">Click a number to guess!</div>

    <script>
        // Generating secret number between 1 and 10
        var secretNumber = Math.floor(Math.random() * 10) + 1; 
        var gameOver = false; 
        var attemptsLeft = 3; 

        // Function to dynamically create buttons from 1 to 10
        function createButtons() {
            var container = document.getElementById("numbers-container");
            for (var i = 1; i <= 10; i++) {
                var button = document.createElement("button");
                button.innerHTML = i; 
                button.className = "number-btn"; 

                // Closure to handle button click with unique number i
                (function(number) {
                    button.onclick = function() {
                        makeGuess(number);
                    };
                })(i);

                container.appendChild(button); 
            }
        }

        // Function to process user's guess
        function makeGuess(userGuess) {
            if (gameOver) {
                return; 
            }

            var resultDisplay = document.getElementById("result-display");

            // Control structures (if-else) to check the guess
            if (userGuess === secretNumber) {
                resultDisplay.innerHTML = "You won! The secret number was indeed " + secretNumber + ". Reload the page to play again.";
                resultDisplay.style.color = "green"; 
                gameOver = true; 
            } else {
                attemptsLeft--; 

                if (attemptsLeft === 0) {
                    resultDisplay.innerHTML = "You lost! The secret number was " + secretNumber + ". Reload the page to play again.";
                    resultDisplay.style.color = "red";
                    gameOver = true;
                } else if (userGuess < secretNumber) {
                    resultDisplay.innerHTML = "Too low! Try again. Attempts left: " + attemptsLeft;
                    resultDisplay.style.color = "orange";
                } else if (userGuess > secretNumber) {
                    resultDisplay.innerHTML = "Too high! Try again. Attempts left: " + attemptsLeft;
                    resultDisplay.style.color = "red";
                }
            }
        }
        
        // Initializing the game
        createButtons();
    </script>
</body>
</html>
